function pip(pt,ring){var x=pt[0],y=pt[1],inside=false;for(var i=0,j=ring.length-1;i<ring.length;j=i++){var xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];if(((yi>y)!==(yj>y))&&x<(xj-xi)*(y-yi)/(yj-yi)+xi)inside=!inside;}return inside;}
function inZone(lon,lat){var c=ISO.features[0].geometry.coordinates;for(var p=0;p<c.length;p++){if(pip([lon,lat],c[p][0])){var h=false;for(var i=1;i<c[p].length;i++)if(pip([lon,lat],c[p][i])){h=true;break;}if(!h)return true;}}return false;}
function dist(lat1,lon1,lat2,lon2){var R=6371,dL=(lat2-lat1)*Math.PI/180,dO=(lon2-lon1)*Math.PI/180,a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function fmtDur(s){var h=Math.floor(s/3600),m=Math.round((s%3600)/60);return h===0?m+' min':h+'h'+(m>0?(''+m).padStart(2,'0'):'00');}

function showCommune(name,lat,lon,forceIn){
  if(searchMarker)map.removeLayer(searchMarker);
  if(routeLine)map.removeLayer(routeLine);
  var isIn = forceIn !== undefined ? forceIn : inZone(lon,lat);
  var color=isIn?'#16a34a':'#dc2626';
  var ico=L.divIcon({className:'',html:'<div style="width:12px;height:12px;border-radius:50%;background:'+color+';border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',iconSize:[12,12],iconAnchor:[6,6]});
  searchMarker=L.marker([lat,lon],{icon:ico}).bindPopup('<b>'+name+'</b><br>calcul...').addTo(map).openPopup();
  routeLine=L.polyline([[K[0],K[1]],[lat,lon]],{color:'#6366f1',weight:2,opacity:.4,dashArray:'6,4'}).addTo(map);
  map.fitBounds([[Math.min(K[0],lat)-.05,Math.min(K[1],lon)-.05],[Math.max(K[0],lat)+.05,Math.max(K[1],lon)+.05]]);
  var d=dist(K[0],K[1],lat,lon);
  document.getElementById('rc-title').textContent=name;
  document.getElementById('rc-zone-val').style.color=isIn?'#16a34a':'#dc2626'; document.getElementById('rc-zone-val').textContent=isIn?'Dans la zone':'Hors zone';
  
  document.getElementById('rc-dist-val').textContent=d.toFixed(1)+' km';
  document.getElementById('rc-time-val').textContent='...';
  document.getElementById('resultCard').classList.add('v');
  highlightSidebar(name);
  getTravelTime(lat, lon, name);
}



function closeResult(){document.getElementById('resultCard').classList.remove('v');if(searchMarker)map.removeLayer(searchMarker);if(routeLine)map.removeLayer(routeLine);searchMarker=null;routeLine=null;}

function renderList(list){
  var el=document.getElementById('sb-list');
  document.getElementById('sb-badge').textContent=list.length;
  if(!list.length){el.innerHTML='<div class="sb-empty">Aucune commune trouvee.</div>';return;}
  var html='';
  for(var i=0;i<list.length;i++){
    var c=list[i];
    var id='c'+c.name.replace(/[^a-zA-Z0-9]/g,'_');
    html+='<div class="c-item" id="'+id+'" onclick="itemClick(this)" data-name="'+c.name.replace(/"/g,'&quot;')+'" data-lat="'+c.lat+'" data-lon="'+c.lon+'">'
      +'<span class="c-name">'+c.name+'</span>'
      +'<span class="c-dur" id="d'+id+'"></span>'
      +'<span class="c-arrow">&#8594;</span></div>';
  }
  el.innerHTML=html;
}

function itemClick(el){
  var name=el.getAttribute('data-name');
  var lat=parseFloat(el.getAttribute('data-lat'));
  var lon=parseFloat(el.getAttribute('data-lon'));
  document.getElementById('searchInput').value=name;
  document.getElementById('clearBtn').classList.add('v');
  showCommune(name,lat,lon,true);
}

function highlightSidebar(name){
  document.querySelectorAll('.c-item.active').forEach(function(e){e.classList.remove('active');});
  var id='c'+name.replace(/[^a-zA-Z0-9]/g,'_');
  var el=document.getElementById(id);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest',behavior:'smooth'});activeEl=el;}
}

function filterList(q){var f=q.trim().toLowerCase();renderList(f?COMMUNES.filter(function(c){return c.name.toLowerCase().indexOf(f)!==-1;}):COMMUNES);}

function closeSug(){document.getElementById('suggestions').classList.remove('open');}
async function doSearch(q){
  if(q.length<2){closeSug();return;}
  document.getElementById('spinner').style.display='block';
  try{
    var r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=6&accept-language=fr&countrycodes=fr');
    var data=await r.json();
    var el=document.getElementById('suggestions');
    if(!data.length){el.classList.remove('open');}
    else{
      var html='';
      for(var i=0;i<data.length;i++){var it=data[i];var main=it.name||it.display_name.split(',')[0];var sub=it.display_name.split(',').slice(1,3).join(',').trim();html+='<div class="sug-item" onclick="pickSug('+i+')"><div class="sug-name">'+main+'</div><div class="sug-sub">'+sub+'</div></div>';}
      el.innerHTML=html;el._data=data;el.classList.add('open');
    }
  }catch(e){}
  document.getElementById('spinner').style.display='none';
}

function pickSug(i){
  var r=document.getElementById('suggestions')._data[i];
  var name=r.name||r.display_name.split(',')[0];
  var lat=parseFloat(r.lat),lon=parseFloat(r.lon);
  document.getElementById('searchInput').value=name;
  document.getElementById('clearBtn').classList.add('v');
  closeSug();showCommune(name,lat,lon);
}

function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('clearBtn').classList.remove('v');closeSug();closeResult();}
var inp=document.getElementById('searchInput');
inp.addEventListener('input',function(e){var v=e.target.value.trim();document.getElementById('clearBtn').classList.toggle('v',v.length>0);clearTimeout(searchTimeout);searchTimeout=setTimeout(function(){doSearch(v);},350);});
inp.addEventListener('keydown',function(e){if(e.key==='Escape')clearSearch();});
document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap'))closeSug();});

async function getTravelTime(lat, lon, name) {
  var dbg = document.getElementById('rc-time-val');
  try {
    var resp = await fetch('https://api.openrouteservice.org/v2/directions/driving-car', {
      method: 'POST',
      headers: {
        'Authorization': ORS_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ coordinates: [[K_LON, K_LAT], [lon, lat]] })
    });

    if (!resp.ok) { dbg.textContent = 'HTTP ' + resp.status; return; }

    var data = await resp.json();

    // ORS renvoie soit summary.duration, soit segments[0].duration selon le format
    var secs = null;
    if (data.features && data.features[0]) {
      var props = data.features[0].properties;
      if (props.summary && props.summary.duration != null) secs = props.summary.duration;
      else if (props.segments && props.segments[0]) secs = props.segments[0].duration;
    } else if (data.routes && data.routes[0] && data.routes[0].summary) {
      secs = data.routes[0].summary.duration;
    }

    if (secs == null) {
      dbg.textContent = 'Format inconnu';
      console.error('Reponse ORS:', JSON.stringify(data).substring(0,300));
      return;
    }

    var txt = fmtDur(secs);
    dbg.textContent = txt;
    if (searchMarker) searchMarker.setPopupContent('<b>' + name + '</b><br>' + txt);
    if (activeEl) { var d = activeEl.querySelector('.c-dur'); if (d) { d.textContent = txt; d.classList.add('v'); } }

  } catch (err) {
    dbg.textContent = 'ERR=' + err.message;
    console.error('getTravelTime:', err);
  }
}
function toggleMobileSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobile-overlay').classList.toggle('open');
}

  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('mobile-overlay').classList.remove('open');

};
