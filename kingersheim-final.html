<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;background:#f8fafc}
#app{display:flex;height:100vh}

/* MAP */
#map-col{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%}

/* SEARCH OVERLAY */
.search-wrap{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:1000;width:min(440px,80%)}
.search-box{display:flex;align-items:center;gap:8px;background:white;border-radius:12px;padding:10px 14px;box-shadow:0 4px 20px rgba(0,0,0,.15);border:2px solid transparent;transition:border-color .2s}
.search-box:focus-within{border-color:#6366f1}
.search-box input{flex:1;border:none;outline:none;font-size:14px;color:#1e293b;background:transparent}
.search-box input::placeholder{color:#94a3b8}
.sb-icon{color:#94a3b8;flex-shrink:0;width:16px;height:16px}
.sb-spin{width:16px;height:16px;border:2px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;display:none;flex-shrink:0}
.sb-clear{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;display:none;line-height:1;flex-shrink:0}
.sb-clear.v{display:block}
.suggestions{background:white;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);margin-top:6px;overflow:hidden;display:none}
.suggestions.open{display:block}
.sug-item{padding:10px 14px;cursor:pointer;font-size:13px;color:#334155;border-bottom:1px solid #f1f5f9;transition:background .1s}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:#f0f9ff}
.sug-name{font-weight:600}
.sug-sub{font-size:11px;color:#94a3b8;margin-top:1px}

/* RESULT CARD */
.result-card{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;background:white;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:16px 20px;width:min(400px,85%);display:none}
.result-card.v{display:block;animation:fadeup .2s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.rc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.rc-title{font-size:16px;font-weight:700;color:#0f172a}
.rc-close{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;line-height:1;margin-left:8px}
.rc-rows{display:flex;flex-direction:column;gap:8px}
.rc-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#f8fafc}
.rc-row-icon{font-size:18px;flex-shrink:0}
.rc-row-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.rc-row-val{font-size:15px;font-weight:700;color:#0f172a;margin-top:1px}
.rc-row.green{background:#f0fdf4}.rc-row.red{background:#fef2f2}
.rc-row.green .rc-row-val{color:#15803d}
.rc-row.red .rc-row-val{color:#dc2626}
.rc-loading{text-align:center;padding:8px 0;color:#94a3b8;font-size:13px;display:none}

/* SIDEBAR */
#sidebar{width:300px;flex-shrink:0;background:white;border-left:1px solid #e2e8f0;display:flex;flex-direction:column}
.sb-head{padding:16px 16px 0;flex-shrink:0}
.sb-head-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sb-head-title{font-size:14px;font-weight:700;color:#0f172a}
.sb-badge{background:#ede9fe;color:#5b21b6;font-size:11px;font-weight:700;border-radius:20px;padding:2px 8px;margin-left:6px}
.sb-search{position:relative;margin-bottom:12px}
.sb-search input{width:100%;padding:8px 10px 8px 32px;border:1px solid #e2e8f0;border-radius:9px;font-size:13px;color:#334155;outline:none;background:#f8fafc}
.sb-search input:focus{border-color:#a5b4fc;background:white}
.sb-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none}
.sb-divider{height:1px;background:#f1f5f9}
.sb-list{flex:1;overflow-y:auto}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
.c-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;border-bottom:1px solid #f8fafc;transition:background .1s}
.c-item:last-child{border-bottom:none}
.c-item:hover,.c-item.active{background:#f5f3ff}
.c-item.active .c-name{color:#5b21b6;font-weight:600}
.c-name{font-size:13px;color:#0f172a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-dur{font-size:11px;color:#6366f1;font-weight:600;flex-shrink:0;margin-left:6px;display:none}
.c-dur.v{display:block}
.c-arrow{font-size:11px;color:#c4b5fd;opacity:0;flex-shrink:0;margin-left:4px}
.c-item:hover .c-arrow,.c-item.active .c-arrow{opacity:1}
.sb-empty{text-align:center;padding:32px;color:#94a3b8;font-size:13px}

/* HEADER BADGE */
.map-badge{position:absolute;top:16px;left:16px;z-index:500;background:white;border-radius:10px;padding:8px 12px;box-shadow:0 2px 10px rgba(0,0,0,.1);pointer-events:none}
.mb-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6366f1;margin-bottom:1px}
.mb-title{font-size:13px;font-weight:700;color:#0f172a}

/* PULSE */
.pulse{width:14px;height:14px;background:#6366f1;border-radius:50%;border:3px solid white;animation:pulse 2s ease-out infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(99,102,241,.5)}70%{box-shadow:0 0 0 12px rgba(99,102,241,0)}100%{box-shadow:0 0 0 0 rgba(99,102,241,0)}}

@keyframes spin{to{transform:rotate(360deg)}}

/* Leaflet */
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px rgba(0,0,0,.12)!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:white!important;color:#475569!important;border:none!important;border-bottom:1px solid #f1f5f9!important;width:28px!important;height:28px!important;line-height:28px!important}
.leaflet-control-zoom a:hover{color:#6366f1!important;background:#f5f3ff!important}
.leaflet-control-attribution{font-size:10px!important}

@media(max-width:768px){
  #sidebar{display:none}
}
</style>

    }
  }
  return false;
}

// ── DISTANCE ──
function distKm(lat1, lon1, lat2, lon2) {
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── FORMAT DURATION ──
function fmtDur(seconds) {
  var h=Math.floor(seconds/3600), m=Math.round((seconds%3600)/60);
  if (h===0) return m+' min';
  return h+'h'+(m>0?String(m).padStart(2,'0'):'00');
}

// ── SHOW COMMUNE ON MAP ──
function showCommune(name, lat, lon) {
  if (searchMarker) map.removeLayer(searchMarker);
  if (routeLine) map.removeLayer(routeLine);
  var isIn = inZone(lon, lat);
  var color = isIn ? '#16a34a' : '#dc2626';
  var ico = L.divIcon({className:'', html:'<div style="width:12px;height:12px;border-radius:50%;background:'+color+';border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>', iconSize:[12,12], iconAnchor:[6,6]});
  searchMarker = L.marker([lat,lon], {icon:ico}).addTo(map);
  map.fitBounds([[Math.min(K[0],lat)-0.05, Math.min(K[1],lon)-0.05],[Math.max(K[0],lat)+0.05, Math.max(K[1],lon)+0.05]]);
  // Draw straight line
  routeLine = L.polyline([[K[0],K[1]],[lat,lon]], {color:'#6366f1', weight:2, opacity:0.4, dashArray:'6,4'}).addTo(map);
  // Show result card
  var dist = distKm(K[0], K[1], lat, lon);
  document.getElementById('rc-title').textContent = name;
  document.getElementById('rc-zone-icon').textContent = isIn ? '✅' : '❌';
  document.getElementById('rc-zone-val').textContent = isIn ? 'Dans la zone (< 1h)' : 'Hors zone (> 1h)';
  document.getElementById('rc-zone').className = 'rc-row ' + (isIn ? 'green' : 'red');
  document.getElementById('rc-dist-val').textContent = dist.toFixed(1)+' km';
  document.getElementById('rc-time-val').textContent = '...';
  document.getElementById('rc-loading').style.display = 'block';
  document.getElementById('resultCard').classList.add('v');
  // Get travel time from ORS
  getTravelTime(lat, lon, name);
  // Highlight sidebar
  highlightSidebar(name);
}

// ── ORS TRAVEL TIME ──
async function getTravelTime(lat, lon, name) {
  if (!ORS_KEY) {
    document.getElementById('rc-loading').style.display = 'none';
    document.getElementById('rc-time-val').textContent = 'Clé API requise';
    return;
  }
  try {
    var res = await fetch('https://api.openrouteservice.org/v2/directions/driving-car?api_key='+ORS_KEY+'&start='+K_LONLAT[0]+','+K_LONLAT[1]+'&end='+lon+','+lat);
    var data = await res.json();
    var secs = data.features[0].properties.segments[0].duration;
    document.getElementById('rc-time-val').textContent = fmtDur(secs);
    // Update sidebar item
    var el = document.querySelector('.c-item.active .c-dur');
    if (el) { el.textContent = fmtDur(secs); el.classList.add('v'); }
  } catch(e) {
    document.getElementById('rc-time-val').textContent = 'Erreur API';
  }
  document.getElementById('rc-loading').style.display = 'none';
}

function closeResult() {
  document.getElementById('resultCard').classList.remove('v');
  if (searchMarker) map.removeLayer(searchMarker);
  if (routeLine) map.removeLayer(routeLine);
  searchMarker = null; routeLine = null;
}

// ── SIDEBAR LIST ──
function renderList(list) {
  var el = document.getElementById('sb-list');
  document.getElementById('sb-badge').textContent = list.length;
  if (!list.length) { el.innerHTML = '<div class="sb-empty">Aucune commune trouvée.</div>'; return; }
  var html = '';
  for (var i=0; i<list.length; i++) {
    var c=list[i];
    var id='c-'+c.name.replace(/[^a-zA-Z0-9]/g,'_');
    html += '<div class="c-item" id="'+id+'" onclick="listClick(this)" data-name="'+c.name.replace(/"/g,'&quot;')+'" data-lat="'+c.lat+'" data-lon="'+c.lon+'">'
          + '<span class="c-name">'+c.name+'</span>'
          + '<span class="c-dur" id="dur-'+id+'"></span>'
          + '<span class="c-arrow">&#8594;</span></div>';
  }
  el.innerHTML = html;
}

function listClick(el) {
  var name=el.getAttribute('data-name');
  var lat=parseFloat(el.getAttribute('data-lat'));
  var lon=parseFloat(el.getAttribute('data-lon'));
  document.getElementById('searchInput').value = name;
  document.getElementById('clearBtn').classList.add('v');
  showCommune(name, lat, lon);
}

function highlightSidebar(name) {
  document.querySelectorAll('.c-item.active').forEach(function(el){ el.classList.remove('active'); });
  var id='c-'+name.replace(/[^a-zA-Z0-9]/g,'_');
  var el=document.getElementById(id);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest', behavior:'smooth'}); activeCommune=el; }
}

function filterList(q) {
  var f=q.trim().toLowerCase();
  renderList(f ? COMMUNES.filter(function(c){ return c.name.toLowerCase().indexOf(f)!==-1; }) : COMMUNES);
}

// ── SEARCH BAR ──
function closeSuggestions() { document.getElementById('suggestions').classList.remove('open'); }

async function doSearch(q) {
  if (q.length < 2) { closeSuggestions(); return; }
  document.getElementById('spinner').style.display = 'block';
  try {
    var res = await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=6&accept-language=fr&countrycodes=fr');
    var data = await res.json();
    var el = document.getElementById('suggestions');
    if (!data.length) { el.classList.remove('open'); }
    else {
      var html='';
      for (var i=0; i<data.length; i++) {
        var r=data[i];
        var main=r.name||r.display_name.split(',')[0];
        var sub=r.display_name.split(',').slice(1,3).join(',').trim();
        html+='<div class="sug-item" onclick="pickSug('+i+')"><div class="sug-name">'+main+'</div><div class="sug-sub">'+sub+'</div></div>';
      }
      el.innerHTML=html; el._data=data; el.classList.add('open');
    }
  } catch(e){}
  document.getElementById('spinner').style.display='none';
}

function pickSug(i) {
  var r=document.getElementById('suggestions')._data[i];
  var name=r.name||r.display_name.split(',')[0];
  var lat=parseFloat(r.lat), lon=parseFloat(r.lon);
  document.getElementById('searchInput').value=name;
  document.getElementById('clearBtn').classList.add('v');
  closeSuggestions();
  showCommune(name, lat, lon);
}

function clearSearch() {
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.remove('v');
  closeSuggestions(); closeResult();
}

var inp=document.getElementById('searchInput');
inp.addEventListener('input', function(e){
  var v=e.target.value.trim();
  document.getElementById('clearBtn').classList.toggle('v', v.length>0);
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(function(){ doSearch(v); }, 350);
});
inp.addEventListener('keydown', function(e){ if(e.key==='Escape') clearSearch(); });
document.addEventListener('click', function(e){ if(!e.target.closest('.search-wrap')) closeSuggestions(); });

// ── API KEY CONFIG ──
// Remplace '' par ta clé ORS pour obtenir les durées exactes
// Ex: var ORS_KEY = '5b3ce3597851110001cf6248...';

renderList(COMMUNES);
</script>
